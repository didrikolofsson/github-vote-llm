name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Test, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Lint OpenAPI spec
        uses: jeanblanchard/redocly-action@v1
        with:
          args: lint openapi.yaml

      - name: Build
        run: go build ./...
