github:
  token: "${GITHUB_TOKEN}"
  webhook_secret: "${WEBHOOK_SECRET}"
  # GitHub App auth (alternative to token):
  app_id: 2883277
  private_key_path: "/etc/vote-llm/app-key.pem"

server:
  port: 8080

database:
  path: "vote-llm.db"

repos:
  - owner: "didrikolofsson"
    name: "github-vote-llm"
    labels:
      feature_request: "feature-request"
      approved: "approved-for-dev"
      in_progress: "llm-in-progress"
      done: "llm-pr-created"
      candidate: "candidate"
      failed: "llm-failed"
    vote_threshold: 5

agent:
  command: "claude"
  max_turns: 25
  max_budget_usd: 5.00
  allowed_tools:
    - "Read"
    - "Edit"
    - "Write"
    - "Bash"
    - "Glob"
    - "Grep"
  workspace_dir: "/tmp/vote-llm-workspaces"
